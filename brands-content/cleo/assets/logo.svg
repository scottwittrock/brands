<svg xmlns="http://www.w3.org/2000/svg" width="300" height="96" viewBox="0 0 300 96" role="img" aria-label="Cleo logo">
  <g transform="translate(12 20)">
    <!-- ears -->
    <circle cx="17" cy="17" r="9" fill="#a8c5a0"/>
    <circle cx="47" cy="17" r="9" fill="#a8c5a0"/>
    <circle cx="17" cy="17" r="4.5" fill="#f4a97f"/>
    <circle cx="47" cy="17" r="4.5" fill="#f4a97f"/>
    <!-- head -->
    <circle cx="32" cy="36" r="23" fill="#a8c5a0"/>
    <!-- muzzle -->
    <ellipse cx="32" cy="44" rx="11" ry="8.5" fill="#faf7f2"/>
    <!-- eyes -->
    <circle cx="24" cy="33" r="2.6" fill="#3d4a52"/>
    <circle cx="40" cy="33" r="2.6" fill="#3d4a52"/>
    <!-- nose -->
    <path d="M29.4 41.2h5.2c.9 0 1.4 1 .9 1.8l-2.6 3.2a1.1 1.1 0 0 1-1.8 0l-2.6-3.2c-.5-.7 0-1.8.9-1.8Z" fill="#3d4a52"/>
    <!-- smile -->
    <path d="M28.5 48.5c1 1.1 2.2 1.7 3.5 1.7s2.5-.6 3.5-1.7" stroke="#3d4a52" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  </g>
  <text x="92" y="62" font-family="'DM Sans', ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="46" font-weight="700" fill="#3d4a52">Cleo<tspan fill="#a8c5a0">.</tspan></text>
</svg>

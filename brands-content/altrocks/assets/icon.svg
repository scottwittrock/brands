<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Altrocks icon">
  <defs>
    <filter id="tear" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028 0.05" numOctaves="4" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Paper ground, per brand rule (mark is never outlined, never shadowed). -->
  <rect width="96" height="96" rx="22" fill="#F7F2E8"/>
  <!-- The Stack, torn tops/sides, clean baseline (nested viewport clips at y=180 grid). -->
  <svg x="12" y="26" width="72" height="53.5" viewBox="14 24 210 156">
    <g filter="url(#tear)">
      <rect x="20" y="88" width="30" height="98" fill="#E8A33D"/>
      <rect x="58" y="32" width="32" height="154" fill="#FF6250"/>
      <rect x="98" y="24" width="32" height="162" fill="#125E7A"/>
      <rect x="138" y="104" width="28" height="82" fill="#C9457A"/>
      <rect x="174" y="140" width="46" height="46" fill="#5C7F4B"/>
    </g>
  </svg>
</svg>

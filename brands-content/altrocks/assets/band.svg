<svg xmlns="http://www.w3.org/2000/svg" width="360" height="120" viewBox="0 0 360 120" role="img" aria-label="Altrocks torn band">
  <!-- Torn Band: a ripped horizontal strip of coral with ALTROCKS in paper. All
       edges tear via the displacement filter; the paper-color wordmark reads as
       knocked out against the coral. -->
  <defs>
    <filter id="tear" x="-6%" y="-14%" width="112%" height="128%">
      <feTurbulence type="fractalNoise" baseFrequency="0.026 0.06" numOctaves="4" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#tear)">
    <rect x="22" y="30" width="316" height="60" fill="#FF6250"/>
  </g>
  <text x="180" y="72" text-anchor="middle" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="44" font-weight="900" letter-spacing="-1" fill="#F7F2E8">ALTROCKS</text>
</svg>
